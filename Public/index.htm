<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Downloader</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .res-btn { background: #10b981; margin-top: 10px; }
        #result { margin-top: 20px; display: none; }
        #result img { width: 100%; border-radius: 8px; }
        .loading { color: #f59e0b; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>MediaFetch</h1>
        <p>Supports YouTube, X, Pornhub & more</p>
        <input type="text" id="urlInput" placeholder="Paste link here...">
        <button onclick="getInfo()">Fetch Video Info</button>
        <div id="loading" class="loading">⚙️ Processing... Please wait.</div>

        <div id="result">
            <img id="thumb" src="" alt="">
            <h3 id="title"></h3>
            <div id="downloadOptions"></div>
        </div>
    </div>

    <script>
        async function getInfo() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('result');
            const loadDiv = document.getElementById('loading');

            if(!url) return alert("Paste a link first!");

            loadDiv.style.display = 'block';
            resDiv.style.display = 'none';

            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await response.json();

                document.getElementById('thumb').src = data.thumbnail;
                document.getElementById('title').innerText = data.title;
                
                const opt = document.getElementById('downloadOptions');
                opt.innerHTML = '';
                ['360', '720', '1080'].forEach(q => {
                    const btn = document.createElement('button');
                    btn.className = 'res-btn';
                    btn.innerText = `Download ${q}p`;
                    btn.onclick = () => window.location.href = `/api/download?url=${encodeURIComponent(url)}&quality=${q}`;
                    opt.appendChild(btn);
                });

                resDiv.style.display = 'block';
            } catch (e) {
                alert("Error fetching video. Is the server running?");
            } finally {
                loadDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
